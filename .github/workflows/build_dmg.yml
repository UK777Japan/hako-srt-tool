name: Build Mac DMG

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'build/mac/**'
      - '.streamlit/**'

jobs:
  build-dmg:
    name: Build DMG (Apple Silicon)
    runs-on: macos-14
    timeout-minutes: 180

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: キャッシュ（Python standalone / ffmpeg）
        uses: actions/cache@v4
        with:
          path: build/mac/cache
          key: mac-build-cache-${{ runner.arch }}-v1
          restore-keys: mac-build-cache-${{ runner.arch }}-

      - name: DMG をビルド
        run: bash build/mac/build_dmg.sh

      - name: DMG をアップロード
        uses: actions/upload-artifact@v4
        with:
          name: ハコ割り生成ツール_setup_dmg_arm64
          path: dist/mac/ハコ割り生成ツール_setup.dmg
          retention-days: 14
          if-no-files-found: error
